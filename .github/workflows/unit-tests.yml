name: Unit Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: credits + stripe unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Runs every *.test.ts under apps/web/lib/credits and apps/web/lib/stripe
      # via Bun's built-in test runner. Scope is intentionally narrow — these
      # are pure-unit tests with no external dependencies (no Redis, Supabase,
      # Privy, etc.), so they're safe and fast to run on every PR.
      #
      # Broader integration tests in apps/web/lib/sandbox/, hooks/, and the
      # route tests under app/api/ are intentionally excluded — they need
      # services that aren't available on a vanilla GitHub Actions runner.
      - name: Run unit tests
        run: bun test apps/web/lib/credits apps/web/lib/stripe

name: Unit Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: bun run test:unit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Test scope lives in the root package.json `test:unit` script so it
      # can be widened (or narrowed) without touching the workflow file.
      # Same pattern as the chat repo where `pnpm test` defers to
      # vitest.config.ts for the scope.
      - name: Run unit tests
        run: bun run test:unit
